
name: CI – RailOps Copilot

# declencher le robot
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # JOB 1 : Vérifier que le code est propre (lint)
  lint:
    runs-on: ubuntu-latest        # GitHub nous prête une machine Linux
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer Ruff (outil de lint)
        run: pip install ruff

      - name: Vérifier le style du code
        run: ruff check app/ tests/ --ignore E501

  # JOB 2 : Lancer les tests pytest
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Initialiser la base SQLite
        run: python -m scripts.init_db

      - name: Lancer les tests
        run: python -m pytest tests/ -v

  # JOB 3 : Vérifier que le Dockerfile se build
  docker:
    runs-on: ubuntu-latest
    needs: test                   # attend que les tests passent avant de builder
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Builder l'image Docker
        run: docker build -t railops-copilot .